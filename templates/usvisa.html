<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>US Visa Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
  </head>
  <body>

    <!-- Decorative background -->
    <div class="bg-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div class="bg-grid"></div>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="container-fluid nav-inner">
        <span class="nav-brand">
          <span class="nav-dot"></span>
          US Visa Portal
        </span>
        <span class="nav-badge">Prediction Tool</span>
      </div>
    </nav>

    <section>
      <div class="page">

        <!-- Hero header -->
        <div class="hero">
          <div class="hero-tag">AI-powered decision support</div>
          <h1>Visa approval prediction</h1>
          <p>Enter applicant and employer details to get an instant eligibility estimate.</p>
        </div>

        <!-- Form -->
        <form action="/" method="post">
          <div class="card">

            <div class="card-section-header">
              <div class="step-badge">01</div>
              <span>Applicant information</span>
            </div>

            <div class="grid">
              <div class="field">
                <label for="continent">Country / continent</label>
                <select id="continent" name="continent" required>
                  <option value="" disabled selected>Select continent</option>
                  <option>Asia</option>
                  <option>Africa</option>
                  <option>North America</option>
                  <option>Europe</option>
                  <option>South America</option>
                  <option>Oceania</option>
                </select>
              </div>

              <div class="field">
                <label for="education_of_employee">Education level</label>
                <select id="education_of_employee" name="education_of_employee" required>
                  <option value="" disabled selected>Select education</option>
                  <option>High School</option>
                  <option>Bachelor's</option>
                  <option>Master's</option>
                  <option>Doctorate</option>
                </select>
              </div>

              <div class="field">
                <label for="has_job_experience">Job experience</label>
                <select id="has_job_experience" name="has_job_experience" required>
                  <option value="" disabled selected>Select</option>
                  <option value="Y">Yes</option>
                  <option value="N">No</option>
                </select>
              </div>

              <div class="field">
                <label for="requires_job_training">Requires training</label>
                <select id="requires_job_training" name="requires_job_training" required>
                  <option value="" disabled selected>Select</option>
                  <option value="N">No</option>
                  <option value="Y">Yes</option>
                </select>
              </div>
            </div>

            <div class="card-section-header section-gap">
              <div class="step-badge">02</div>
              <span>Employer &amp; position details</span>
            </div>

            <div class="grid">
              <div class="field">
                <label for="region_of_employment">Employment region</label>
                <select id="region_of_employment" name="region_of_employment" required>
                  <option value="" disabled selected>Select region</option>
                  <option>West</option>
                  <option>Northeast</option>
                  <option>South</option>
                  <option>Midwest</option>
                  <option>Island</option>
                </select>
              </div>

              <div class="field">
                <label for="full_time_position">Position type</label>
                <select id="full_time_position" name="full_time_position" required>
                  <option value="" disabled selected>Select</option>
                  <option value="Y">Full time</option>
                  <option value="N">Part time</option>
                </select>
              </div>

              <div class="field">
                <label for="unit_of_wage">Wage period</label>
                <select id="unit_of_wage" name="unit_of_wage" required>
                  <option value="" disabled selected>Select period</option>
                  <option>Hour</option>
                  <option>Week</option>
                  <option>Month</option>
                  <option>Year</option>
                </select>
              </div>

              <div class="field">
                <label for="prevailing_wage">Prevailing wage (USD)</label>
                <input type="number" id="prevailing_wage" name="prevailing_wage" min="600" max="70000" placeholder="700 to 7000" required>
              </div>

              <div class="field">
                <label for="no_of_employees">Number of employees</label>
                <input type="number" id="no_of_employees" name="no_of_employees" min="14500" max="40000" placeholder="15000 to 40000" required>
              </div>

              <div class="field">
                <label for="company_age">Company age (years)</label>
                <input type="number" id="company_age" name="company_age" min="15" max="180" placeholder="10 to 80" required>
              </div>
            </div>

            <div class="submit-row">
              <input class="submit-btn" type="submit" value="Predict visa status →">
            </div>

          </div>
        </form>

        <!-- Result -->
        <div class="result-box">
          <div class="result-label">Prediction result</div>
          <div class="result-value">{{context}}</div>
        </div>

      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.2.1.js"></script>
    <script type="text/javascript">
      $(".input").focus(function () {
        $(this).parent().addClass("focus");
      }).blur(function () {
        if ($(this).val() === '') {
          $(this).parent().removeClass("focus");
        }
      });
    </script>
  </body>
</html>
